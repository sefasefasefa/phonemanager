workflows:
  ios-build:
    name: iOS Unsigned Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build iOS Unsigned IPA
        script: |
          flutter build ios --release --no-codesign
      - name: Post-build Archive for E-Sign
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ios_unsigned.ipa Payload
    artifacts:
      - build/ios/iphoneos/ios_unsigned.ipa
